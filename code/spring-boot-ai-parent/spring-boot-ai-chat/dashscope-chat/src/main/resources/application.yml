server:
  port: 10001
spring:
  application:
    name: spring-boot-ai-dashscope-chat
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: "qwen3.5-plus"
          multi-model: true
          top-p: 0.7


logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
